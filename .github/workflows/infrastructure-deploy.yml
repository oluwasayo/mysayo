name: Infrastructure Deploy

permissions:
  contents: read

concurrency:
  cancel-in-progress: false
  group: terraform-production

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/infrastructure-deploy.yml'
      - 'infrastructure/**'
  workflow_dispatch:

env:
  ENVIRONMENT: production
  PROJECT: mysayo
  TF_STATE_BUCKET: mysayo-production-terraform-state

jobs:
  deploy-infrastructure:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      # Terraform's R2 backend uses S3-compatible API env var names.
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: npm
          cache-dependency-path: package-lock.json
          node-version: 26

      - name: Install dependencies
        run: npm ci

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: '1.15.5'

      - name: Terraform init
        working-directory: infrastructure
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="endpoint=https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com"

      - name: Terraform plan
        working-directory: infrastructure
        run: |
          terraform plan -no-color \
            -var="cloudflare_account_id=${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" \
            -var="cloudflare_api_token=${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -var="cloudflare_zone_id=${{ secrets.CLOUDFLARE_ZONE_ID }}" \
            -out=tfplan

      - name: Generate plan summary
        working-directory: infrastructure
        run: terraform show -no-color tfplan > plan.txt

      - name: Filter plan output
        run: npm run filter-terraform-plan -- --input infrastructure/plan.txt --output infrastructure/plan-filtered.txt --ci

      - name: Show filtered plan
        working-directory: infrastructure
        run: cat plan-filtered.txt

      - name: Terraform apply
        working-directory: infrastructure
        run: terraform apply -no-color -auto-approve tfplan
