name: Web checks reusable

on:
  workflow_call:
    inputs:
      upload_test_report:
        type: boolean
        required: false
        default: true

jobs:
  web-checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: npm
          cache-dependency-path: package-lock.json
          node-version: 26

      - name: Get installed Playwright version
        id: playwright-version
        run: echo "PLAYWRIGHT_VERSION=$(node -e "console.log(require('./package-lock.json').packages['node_modules/playwright'].version)")" >> $GITHUB_ENV

      - name: Cache playwright binaries
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: playwright-cache
        with:
          path: |
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-${{ runner.arch }}-playwright-${{ env.PLAYWRIGHT_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Validate clean script
        run: |
          npm run clean
          if [ -n "$(git status --porcelain)" ]; then
            echo "Clean script detected changes. Run 'npm run clean' and commit."
            git diff
            exit 1
          fi

      - name: Typecheck
        working-directory: code/app/web
        run: npm run tsc

      - name: Lint
        working-directory: code/app/web
        run: npm run lint

      - name: Knip
        run: npm run knip

      - name: Build
        working-directory: code/app/web
        run: npm run build

      - name: Setup Playwright
        working-directory: code/app/web
        run: npx playwright install chromium --with-deps

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload test report
        if: always() && inputs.upload_test_report == true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-report
          path: code/app/web/test-results
